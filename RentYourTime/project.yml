name: RentYourTime
options:
  bundleIdPrefix: com.rentyourtime
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: W8V4CMV6NU
    CODE_SIGN_STYLE: Automatic

targets:
  RentYourTime:
    type: application
    platform: iOS
    sources:
      - path: RentYourTime
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rentyourtime.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: RentYourTime
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        CODE_SIGN_ENTITLEMENTS: RentYourTime/RentYourTime.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_ON_DEMAND_RESOURCES: NO
    dependencies:
      - target: DeviceActivityMonitorExtension
        embed: true
      - target: RentWidgetExtension
        embed: true

  DeviceActivityMonitorExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Extensions/DeviceActivityMonitor
      - path: Shared
    settings:
      base:
        PRODUCT_NAME: DeviceActivityMonitor
        PRODUCT_BUNDLE_IDENTIFIER: com.rentyourtime.app.DeviceActivityMonitor
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Extensions/DeviceActivityMonitor/Info.plist
        CODE_SIGN_ENTITLEMENTS: Extensions/DeviceActivityMonitor/DeviceActivityMonitor.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete

  RentWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Extensions/RentWidget
      - path: Shared
    settings:
      base:
        PRODUCT_NAME: RentWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.rentyourtime.app.RentWidget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Extensions/RentWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Extensions/RentWidget/RentWidget.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete

  RentYourTimeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RentYourTimeTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rentyourtime.app.tests
    dependencies:
      - target: RentYourTime

schemes:
  RentYourTime:
    build:
      targets:
        RentYourTime: all
    test:
      targets:
        - RentYourTimeTests
    run:
      config: Debug
